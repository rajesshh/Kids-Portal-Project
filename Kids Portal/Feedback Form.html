<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Feedback - Kid Learning Portal</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #8cb7e2;
        color: #333;
        line-height: 1.5;
        text-align: center;
    }
    .header {
        background: linear-gradient(to right, #74ebd5, #ACB6E5);
        padding: 30px 20px;
        text-align: center;
        color: white;
        box-shadow: 0 2px 8px rgba (0,0,0,0.1);
    }
    .header h1 {font-size: 2rem; font-weight: 600; }
    </style>
    </head>
    <body>
        <div class="header">
            <h1>Give Your Feedback</h1>
        </div>

        <div class="feedback-container">
            <form id="feedbackform">
                <div class="form-group">
                    <label for="fname">Your Name</label>
                    <input type="text" id="fname" placeholder="Enter your Name" required>
                </div>
                <div class="form-group">
                    <label for="fsubject">Subject</label>
                    <select id="fsubject">
                        <option>Math</option>
                        <option>Science</option>
                        <option>English</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="fmessage">Feedback</label>
                    <textarea id="fmessage" rows="4" placeholder="Write Your Feedback Here.." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Submit Feedback</button>
            </form>
            <p id="foutput" class="output"></p>
        </div>
